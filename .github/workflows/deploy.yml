name: Deploy AWS Bootstrap

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region
        required: true
        type: string
      ecr_repository:
        description: ECR repository name
        required: true
        type: string
      ecs_cluster:
        description: Existing ECS cluster name
        required: true
        type: string
      web_service:
        description: Existing ECS web service name
        required: true
        type: string
      worker_service:
        description: Existing ECS worker service name
        required: true
        type: string
      web_task_family:
        description: Web task definition family
        required: true
        type: string
      worker_task_family:
        description: Worker task definition family
        required: true
        type: string
      migrate_task_family:
        description: Migration task definition family
        required: true
        type: string
      task_execution_role_arn:
        description: ECS task execution role ARN
        required: true
        type: string
      task_role_arn:
        description: ECS task role ARN
        required: true
        type: string
      artifact_bucket:
        description: Private artifact bucket
        required: true
        type: string
      private_subnet_ids:
        description: Comma-separated private subnet IDs
        required: true
        type: string
      task_security_group_ids:
        description: Comma-separated task security group IDs
        required: true
        type: string
      database_url_secret_arn:
        description: Secrets Manager ARN for DATABASE_URL
        required: true
        type: string
      shopify_api_secret_arn:
        description: Secrets Manager ARN for SHOPIFY_API_SECRET
        required: true
        type: string
      shop_token_encryption_key_secret_arn:
        description: Secrets Manager ARN for SHOP_TOKEN_ENCRYPTION_KEY
        required: true
        type: string
      telemetry_pseudonym_key_secret_arn:
        description: Secrets Manager ARN for TELEMETRY_PSEUDONYM_KEY
        required: true
        type: string
      run_shopify_deploy:
        description: Run shopify app deploy after ECS deploy
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      ECR_REPOSITORY: ${{ inputs.ecr_repository }}
      ECS_CLUSTER: ${{ inputs.ecs_cluster }}
      WEB_SERVICE: ${{ inputs.web_service }}
      WORKER_SERVICE: ${{ inputs.worker_service }}
      WEB_TASK_FAMILY: ${{ inputs.web_task_family }}
      WORKER_TASK_FAMILY: ${{ inputs.worker_task_family }}
      MIGRATE_TASK_FAMILY: ${{ inputs.migrate_task_family }}
      TASK_EXECUTION_ROLE_ARN: ${{ inputs.task_execution_role_arn }}
      TASK_ROLE_ARN: ${{ inputs.task_role_arn }}
      ARTIFACT_BUCKET: ${{ inputs.artifact_bucket }}
      PRIVATE_SUBNET_IDS: ${{ inputs.private_subnet_ids }}
      TASK_SECURITY_GROUP_IDS: ${{ inputs.task_security_group_ids }}
      DATABASE_URL_SECRET_ARN: ${{ inputs.database_url_secret_arn }}
      SHOPIFY_API_SECRET_ARN: ${{ inputs.shopify_api_secret_arn }}
      SHOP_TOKEN_ENCRYPTION_KEY_SECRET_ARN: ${{ inputs.shop_token_encryption_key_secret_arn }}
      TELEMETRY_PSEUDONYM_KEY_SECRET_ARN: ${{ inputs.telemetry_pseudonym_key_secret_arn }}
      LOG_GROUP: /ecs/shopify-app-template
      SHOPIFY_API_KEY: ${{ vars.SHOPIFY_API_KEY }}
      SHOPIFY_APP_URL: ${{ vars.SHOPIFY_APP_URL }}
      SCOPES: ${{ vars.SCOPES }}
      S3_ARTIFACT_PREFIX: artifacts
      LOG_LEVEL: info
      QUEUE_POLL_INTERVAL_MS: "30000"
      QUEUE_LEASE_MS: "300000"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Validate required Shopify app config
        run: |
          for name in SHOPIFY_API_KEY SHOPIFY_APP_URL SCOPES; do
            if [ -z "${!name}" ]; then
              echo "Missing required workflow env: ${name}"
              exit 1
            fi
          done

      - name: Build and push image
        run: |
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${GITHUB_SHA}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "${GITHUB_ENV}"
          docker build --tag "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

      - name: Render task definitions
        run: |
          mkdir -p "${RUNNER_TEMP}/task-defs"
          COMMON_ARGS=(
            IMAGE_URI="${IMAGE_URI}"
            TASK_EXECUTION_ROLE_ARN="${TASK_EXECUTION_ROLE_ARN}"
            TASK_ROLE_ARN="${TASK_ROLE_ARN}"
            AWS_REGION="${AWS_REGION}"
            LOG_GROUP="${LOG_GROUP}"
            SHOPIFY_API_KEY="${SHOPIFY_API_KEY}"
            SHOPIFY_APP_URL="${SHOPIFY_APP_URL}"
            SCOPES="${SCOPES}"
            S3_ARTIFACT_BUCKET="${ARTIFACT_BUCKET}"
            S3_ARTIFACT_PREFIX="${S3_ARTIFACT_PREFIX}"
            LOG_LEVEL="${LOG_LEVEL}"
            QUEUE_POLL_INTERVAL_MS="${QUEUE_POLL_INTERVAL_MS}"
            QUEUE_LEASE_MS="${QUEUE_LEASE_MS}"
            DATABASE_URL_SECRET_ARN="${DATABASE_URL_SECRET_ARN}"
            SHOPIFY_API_SECRET_ARN="${SHOPIFY_API_SECRET_ARN}"
            SHOP_TOKEN_ENCRYPTION_KEY_SECRET_ARN="${SHOP_TOKEN_ENCRYPTION_KEY_SECRET_ARN}"
            TELEMETRY_PSEUDONYM_KEY_SECRET_ARN="${TELEMETRY_PSEUDONYM_KEY_SECRET_ARN}"
          )
          node scripts/render-aws-task-definition.mjs \
            infra/aws/ecs/web.task-definition.json \
            "${RUNNER_TEMP}/task-defs/web.json" \
            TASK_FAMILY="${WEB_TASK_FAMILY}" \
            "${COMMON_ARGS[@]}"
          node scripts/render-aws-task-definition.mjs \
            infra/aws/ecs/worker.task-definition.json \
            "${RUNNER_TEMP}/task-defs/worker.json" \
            TASK_FAMILY="${WORKER_TASK_FAMILY}" \
            "${COMMON_ARGS[@]}"
          node scripts/render-aws-task-definition.mjs \
            infra/aws/ecs/migrate.task-definition.json \
            "${RUNNER_TEMP}/task-defs/migrate.json" \
            TASK_FAMILY="${MIGRATE_TASK_FAMILY}" \
            "${COMMON_ARGS[@]}"

      - name: Register and run migration task
        run: |
          MIGRATE_TASK_DEF_ARN="$(
            aws ecs register-task-definition \
              --cli-input-json "file://${RUNNER_TEMP}/task-defs/migrate.json" \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text
          )"
          TASK_ARN="$(
            aws ecs run-task \
              --cluster "${ECS_CLUSTER}" \
              --launch-type FARGATE \
              --task-definition "${MIGRATE_TASK_DEF_ARN}" \
              --network-configuration "awsvpcConfiguration={subnets=[${PRIVATE_SUBNET_IDS}],securityGroups=[${TASK_SECURITY_GROUP_IDS}],assignPublicIp=DISABLED}" \
              --query 'tasks[0].taskArn' \
              --output text
          )"
          aws ecs wait tasks-stopped --cluster "${ECS_CLUSTER}" --tasks "${TASK_ARN}"
          TASK_EXIT_CODE="$(
            aws ecs describe-tasks \
              --cluster "${ECS_CLUSTER}" \
              --tasks "${TASK_ARN}" \
              --query 'tasks[0].containers[0].exitCode' \
              --output text
          )"
          TASK_STOP_CODE="$(
            aws ecs describe-tasks \
              --cluster "${ECS_CLUSTER}" \
              --tasks "${TASK_ARN}" \
              --query 'tasks[0].stopCode' \
              --output text
          )"
          if [ "${TASK_EXIT_CODE}" != "0" ]; then
            echo "Migration task failed: exitCode=${TASK_EXIT_CODE} stopCode=${TASK_STOP_CODE}"
            exit 1
          fi

      - name: Update web service
        run: |
          WEB_TASK_DEF_ARN="$(
            aws ecs register-task-definition \
              --cli-input-json "file://${RUNNER_TEMP}/task-defs/web.json" \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text
          )"
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${WEB_SERVICE}" \
            --task-definition "${WEB_TASK_DEF_ARN}" \
            --force-new-deployment
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${WEB_SERVICE}"

      - name: Update worker service
        run: |
          WORKER_TASK_DEF_ARN="$(
            aws ecs register-task-definition \
              --cli-input-json "file://${RUNNER_TEMP}/task-defs/worker.json" \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text
          )"
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${WORKER_SERVICE}" \
            --task-definition "${WORKER_TASK_DEF_ARN}" \
            --force-new-deployment
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${WORKER_SERVICE}"

      - name: Shopify config deploy
        if: ${{ inputs.run_shopify_deploy == 'true' }}
        env:
          SHOPIFY_CLI_PARTNERS_TOKEN: ${{ secrets.SHOPIFY_CLI_PARTNERS_TOKEN }}
        run: |
          if [ -z "${SHOPIFY_CLI_PARTNERS_TOKEN}" ]; then
            echo "Missing required secret: SHOPIFY_CLI_PARTNERS_TOKEN"
            exit 1
          fi
          npm install --global @shopify/cli@latest
          shopify app deploy --allow-updates
